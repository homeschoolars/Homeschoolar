# Build image, then deploy with a startup probe that allows Next.js to boot.
# Cloud Run requires failureThreshold × periodSeconds ≤ 240 (e.g. 24 × 10s = 240s).
#
# Use a TCP probe on PORT (8080), not HTTP to /api/ready: some gcloud/httpGet mappings
# fail or Next may not serve that path in time; TCP only checks listen() is accepting.
steps:
  - name: gcr.io/kaniko-project/executor:latest
    args:
      - --destination=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/homeschoolar/homeschoolar:$COMMIT_SHA
      - --destination=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/homeschoolar/homeschoolar:latest
      - --cache=true
      - --cache-ttl=6h
      - --dockerfile=Dockerfile
      - --context=.

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        gcloud run deploy homeschoolar \
          --project="$PROJECT_ID" \
          --region=europe-west1 \
          --image="europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/homeschoolar/homeschoolar:$COMMIT_SHA" \
          --platform=managed \
          --allow-unauthenticated \
          --memory=4Gi \
          --cpu=1 \
          --cpu-boost \
          --port=8080 \
          --startup-probe=initialDelaySeconds=30,timeoutSeconds=5,periodSeconds=5,failureThreshold=48,tcpSocket.port=8080 \
          --quiet

options:
  logging: CLOUD_LOGGING_ONLY
