# Build image, optionally run Prisma migrate, then deploy Cloud Run.
#
# --- Prisma migrate (optional, step 0) ---
# Uses substitution _DATABASE_URL (no Secret Manager required).
# - Leave empty (default): migrate is SKIPPED; build + deploy still succeed.
#   (New tables e.g. lesson_videos will NOT exist until you migrate.)
# - Set in Cloud Build trigger → Substitution variables: _DATABASE_URL = your production
#   PostgreSQL URL (same as Cloud Run DATABASE_URL). Then each deploy runs migrate deploy first.
# Prefer Secret Manager + API enabled for production; until then this avoids disabled API errors.
#
# Cloud Run: failureThreshold × periodSeconds ≤ 240. Startup probe uses TCP on PORT 8080.
#
# If deploy fails with: "Conflict for resource ... version X was specified but current version is Y"
# → two deploys raced (retry below usually fixes it). In Cloud Build triggers, prefer max 1 concurrent
# build per branch, and avoid editing the service in console while a deploy runs.

substitutions:
  _DATABASE_URL: ""

steps:
  - name: node:20-bookworm-slim
    id: prisma-migrate
    env:
      - "DATABASE_URL=${_DATABASE_URL}"
    entrypoint: bash
    args:
      - -ceu
      - |
        if [ -z "$${DATABASE_URL:-}" ]; then
          echo "Skipping prisma migrate (_DATABASE_URL empty). Set _DATABASE_URL on the trigger to migrate on deploy."
          exit 0
        fi
        set -euo pipefail
        cd /workspace
        npx --yes prisma@6.19.2 migrate deploy

  - name: gcr.io/kaniko-project/executor:latest
    id: docker-build
    waitFor:
      - prisma-migrate
    args:
      - --destination=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/homeschoolar/homeschoolar:$COMMIT_SHA
      - --destination=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/homeschoolar/homeschoolar:latest
      - --cache=true
      - --cache-ttl=6h
      - --dockerfile=Dockerfile
      - --context=.

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: cloud-run-deploy
    waitFor:
      - docker-build
    entrypoint: bash
    args:
      - -ceu
      - |
        set -euo pipefail
        deploy() {
          gcloud run deploy homeschoolar \
            --project="$PROJECT_ID" \
            --region=europe-west1 \
            --image="europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/homeschoolar/homeschoolar:$COMMIT_SHA" \
            --platform=managed \
            --allow-unauthenticated \
            --memory=4Gi \
            --cpu=1 \
            --cpu-boost \
            --port=8080 \
            --startup-probe=initialDelaySeconds=30,timeoutSeconds=5,periodSeconds=5,failureThreshold=48,tcpSocket.port=8080 \
            --quiet
        }
        max=5
        n=1
        until deploy; do
          if [ "$n" -ge "$max" ]; then
            echo "gcloud run deploy failed after $max attempts (e.g. version conflict — retry build or reduce concurrent deploys)."
            exit 1
          fi
          echo "Deploy attempt $n failed; retrying in $((n * 15))s (Cloud Run optimistic-lock conflict is often transient)..."
          sleep $((n * 15))
          n=$((n + 1))
        done

options:
  logging: CLOUD_LOGGING_ONLY
