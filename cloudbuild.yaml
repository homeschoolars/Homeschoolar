# Build image, run DB migrations against production, then deploy Cloud Run.
#
# --- Prisma migrate (first step) ---
# 1. Secret Manager: create secret "homeschoolar-database-url" (same connection string as Cloud Run DATABASE_URL).
# 2. IAM: grant the Cloud Build service account "Secret Manager Secret Accessor" on that secret.
#    (Project → Cloud Build → Settings → Service account, or PROJECT_NUMBER@cloudbuild.gserviceaccount.com)
# If the secret is missing, this step fails fast so you don't deploy code against an outdated schema.
#
# Cloud Run requires failureThreshold × periodSeconds ≤ 240 (e.g. 24 × 10s = 240s).
# Startup probe uses TCP on PORT (8080), not HTTP.
#
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/homeschoolar-database-url/versions/latest
      env: DATABASE_URL

steps:
  - name: node:20-bookworm-slim
    id: prisma-migrate
    secretEnv:
      - DATABASE_URL
    entrypoint: bash
    args:
      - -ceu
      - |
        set -euo pipefail
        cd /workspace
        npx --yes prisma@6.19.2 migrate deploy

  - name: gcr.io/kaniko-project/executor:latest
    id: docker-build
    waitFor:
      - prisma-migrate
    args:
      - --destination=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/homeschoolar/homeschoolar:$COMMIT_SHA
      - --destination=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/homeschoolar/homeschoolar:latest
      - --cache=true
      - --cache-ttl=6h
      - --dockerfile=Dockerfile
      - --context=.

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: cloud-run-deploy
    waitFor:
      - docker-build
    entrypoint: bash
    args:
      - -ceu
      - |
        gcloud run deploy homeschoolar \
          --project="$PROJECT_ID" \
          --region=europe-west1 \
          --image="europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/homeschoolar/homeschoolar:$COMMIT_SHA" \
          --platform=managed \
          --allow-unauthenticated \
          --memory=4Gi \
          --cpu=1 \
          --cpu-boost \
          --port=8080 \
          --startup-probe=initialDelaySeconds=30,timeoutSeconds=5,periodSeconds=5,failureThreshold=48,tcpSocket.port=8080 \
          --quiet

options:
  logging: CLOUD_LOGGING_ONLY
